$kind: http-request
name: PUT Change Password
method: PUT
url: '{{baseUrl}}/user/password'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "oldPassword": "password123",
      "newPassword": "newpassword456"
    }
